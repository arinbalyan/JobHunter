    # AI/ML Core
    - '"AI Engineer" OR "Artificial Intelligence Engineer"'
    - '"ML Engineer" OR "Machine Learning Engineer"'
    - '"LLM Engineer" OR "Large Language Model Engineer"'
    - '"Deep Learning Engineer"'
    - '"AI/ML Engineer"'
    - '"AI Researcher" OR "Applied AI Scientist"'
    # LangChain / LangGraph / Agent
    - '"LangChain Developer" OR "LangChain Engineer"'
    - '"LangGraph Developer"'
    - '"AI Agent Engineer" OR "AI Agent Developer"'
    - '"CrewAI Engineer" OR "AutoGen Engineer"'
    # Python / Backend / Full Stack
    - '"Python Developer" OR "Python Engineer"'
    - '"Backend Engineer" OR "Backend Developer" OR "Backend Software Engineer"'
    - '"Full Stack Developer" OR "Full Stack Engineer"'
    - '"AI Full Stack Developer" OR "AI Full Stack Engineer"'
    - '"Python Backend Developer" OR "Python Backend Engineer"'
    # MLOps / Data / Infra
    - '"MLOps Engineer" OR "ML Platform Engineer"'
    - '"Data Scientist" OR "Data Engineer"'
    - '"NLP Engineer" OR "Natural Language Processing Engineer"'
    - '"AI Platform Engineer" OR "AI Infrastructure Engineer"'
    # DevOps / Cloud
    - '"DevOps Engineer" OR "Cloud Engineer"'
    # Additional roles
    - '"GTM Engineer" OR "Forward Deployed Engineer" OR "AI Automation Engineer" OR "AI Product Engineer"'

  # Locations to search — major global tech hubs
  locations:
    - "remote"
    - "bangalore"
    - "mumbai"
