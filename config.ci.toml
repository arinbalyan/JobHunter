# ─── LLM Router ───────────────────────────────────────
# Latest free models as of June 2026.
# Researched per-provider: free tier confirmed, no payment required.
# Router does weighted round-robin + failover to keep costs at $0.
[llm]
max_tokens_per_run = 100000
max_tokens_per_request = 2048
temperature = 0.7

[[llm.providers]]
name = "OpenRouter"
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api/v1"
model_complex = "google/gemma-4-31b-it:free"
model_simple = "openrouter/free"
weight = 10
# June 2026: Gemma 4 31B (free) is best free model. openrouter/free routes dynamically.

[[llm.providers]]
name = "Groq"
api_key_env = "GROQ_API_KEY"
base_url = "https://api.groq.com/openai/v1"
model_complex = "openai/gpt-oss-120b"
model_simple = "openai/gpt-oss-20b"
weight = 5
# June 2026: llama-3.3-70b-versatile and llama-3.1-8b-instant DEPRECATED June 17.
# Replaced by gpt-oss-120b (complex) and gpt-oss-20b (simple). 30 RPM free.

[[llm.providers]]
name = "Together"
api_key_env = "TOGETHER_API_KEY"
base_url = "https://api.together.xyz/v1"
model_complex = "google/gemma-4-9b-it"
