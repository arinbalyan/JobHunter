name: Scrape Jobs
on:
  schedule:
    # 4 times daily at IST times: 6 AM, 12 PM, 6 PM, 12 AM IST
    # IST = UTC + 5:30
    # 6:00 AM IST  = 0:30 UTC
    # 12:00 PM IST = 6:30 UTC
    # 6:00 PM IST  = 12:30 UTC
    # 12:00 AM IST = 18:30 UTC (previous day)
    - cron: '30 0 * * *'    # 6:00 AM IST
    - cron: '30 6 * * *'    # 12:00 PM IST
    - cron: '30 12 * * *'   # 6:00 PM IST
    - cron: '30 18 * * *'   # 12:00 AM IST
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Jobs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run scrape
        run: go run ./cmd/scrape/
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPPY_INDEED_API_KEY: ${{ secrets.SCRAPPY_INDEED_API_KEY }}
          SCRAPY_MEMORY_CAP_MB: 100
          LOG_LEVEL: info
