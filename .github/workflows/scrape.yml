name: Scrape Jobs
on:
  schedule:
    # Daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Jobs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: arinbalyan/scrappy
          path: scrappy

      - uses: actions/checkout@v4
        with:
          path: jobhunter

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build scrappy
        working-directory: scrappy
        run: go build -o ../scrappy-bin ./cmd/scrappy/

      - name: Run scrape
        working-directory: jobhunter
        run: go run ./cmd/scrape/
        env:
          PATH: ${{ github.workspace }}:${{ env.PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCRAPPY_CONFIG: ${{ github.workspace }}/scrappy/config.yaml
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
