name: Follow-up Reminder
on:
  schedule:
    # DISABLED: Follow-up workflow needs review before re-enabling
    # See README TODO: Re-enable follow-up workflow
    # Original schedule: 9:00 AM IST = 3:30 UTC
    # - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  followup:
    name: Send Follow-up Reminders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Queue follow-ups
        run: go run ./cmd/followup/
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: info
