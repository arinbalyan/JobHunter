name: Follow-up Reminder
on:
  schedule:
    # Queue follow-ups at 9:00 AM IST = 3:30 UTC
    # After emails are sent (8 AM IST), queue follow-ups for old ones
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  followup:
    name: Send Follow-up Reminders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Queue follow-ups
        run: go run ./cmd/followup/
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          CONTACT_NAME: ${{ secrets.CONTACT_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: info
