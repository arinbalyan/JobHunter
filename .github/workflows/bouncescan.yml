name: Bounce Scan
on:
  schedule:
    # Scan for bounces every Sunday at 11:00 AM IST = 5:30 UTC
    - cron: '30 5 * * 0'
  workflow_dispatch:

jobs:
  bouncescan:
    name: Scan Gmail Bounce Notifications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run bounce scanner
        run: go run ./cmd/bouncescan/
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAP_USER: ${{ secrets.GMAIL_USER }}
          IMAP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: info
