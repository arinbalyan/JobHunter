name: Bounce Scan
on:
  schedule:
    # Check for bounces daily at 10:00 AM IST = 4:30 UTC
    # Runs ~2 hours after the send workflow so bounces have arrived
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  bouncescan:
    name: Scan Gmail for Bounces & Replies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run bounce scanner
        run: go run ./cmd/bouncescan/
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAP_USER: ${{ secrets.GMAIL_USER }}
          IMAP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOUNCE_SCAN_DAYS: 2
          LOG_LEVEL: info
