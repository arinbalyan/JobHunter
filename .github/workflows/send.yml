name: Send Emails
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  send:
    name: Generate & Send Emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release binaries
        run: |
          gh release download --pattern '*.tar.gz' --dir /tmp
          tar xzf /tmp/jobhunter-*.tar.gz -C /tmp
          cp /tmp/jobhunter-*/jobhunter ./jobhunter
          cp /tmp/jobhunter-*/scraper ./scraper/scraper
          chmod +x jobhunter scraper/scraper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create config
        run: cp config.ci.toml config.toml

      - name: Generate & send emails
        run: ./jobhunter send --max 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
