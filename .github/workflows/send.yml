name: Send Emails
on:
  schedule:
    # Once daily at 10:00 AM IST (4:30 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  send:
    name: Generate & Send Emails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Go scraper bridge
        run: cd scraper && go build -o ../scraper .

      - name: Build Rust binary
        run: cargo build --release

      - name: Create config
        run: cp config.example.toml config.toml

      - name: Generate & send emails
        run: ./target/release/jobhunter send --max 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          HYPERBOLIC_API_KEY: ${{ secrets.HYPERBOLIC_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
