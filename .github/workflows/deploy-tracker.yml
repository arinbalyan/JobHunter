name: Deploy Tracking Server
on:
  push:
    branches: [main]
    paths:
      - 'cmd/tracker/**'
      - 'internal/email/tracker/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build tracker binary
        run: go build -o tracker ./cmd/tracker/

      - name: Deploy to Railway
        uses: bervProject/railway-action@v3
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: tracking-server
          build_command: ""
          run_command: ./tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRACKING_SERVER_PORT: 8080

      - name: Verify deployment
        run: |
          echo "Tracking server deployed"
          echo "Set TRACKING_SERVER_URL to your Railway URL"
