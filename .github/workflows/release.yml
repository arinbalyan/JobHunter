name: release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scraper/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scraper/go.mod'
      - 'scraper/go.sum'
      - '.github/workflows/release.yml'
      - '.github/workflows/promote.yml'
      - '.github/scripts/promote.sh'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - id: bump
        name: Bump patch version
        run: |
          LATEST=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.1.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          # Bump past the latest, then keep going if that tag somehow exists
          PATCH=$((PATCH + 1))
          while git rev-parse "v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
          done
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build release tarball
        run: bash scripts/build-release.sh "${{ steps.bump.outputs.tag }}"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || echo "")
          [ -z "$PREV" ] && PREV=$(git rev-list --max-parents=0 HEAD)
          TAG="${{ steps.bump.outputs.tag }}"
          printf "## What's Changed\n\n" > /tmp/notes.md
          gh pr list --state merged --limit 200 \
            --json number,title,url,mergedAt,author \
            | jq -r 'map(select(.title | startswith("promote:") | not)) | sort_by(.mergedAt) | .[] | "* \(.title) by @\(.author.login) in \(.url)"' \
            >> /tmp/notes.md 2>/dev/null || true
          printf "\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n" \
            "${{ github.repository }}" "$PREV" "$TAG" >> /tmp/notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          TARBALL="jobhunter-${TAG}-x86_64-linux.tar.gz"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md \
            "$TARBALL#Linux x86_64 tarball"
