name: Daily Email Sender
on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-agent:
    name: Run JobHunter Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Agent
        run: go run ./cmd/sender
        env:
          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Email SMTP
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_FROM_NAME: JobHunter Agent

          # LLM Providers
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

          # Tracking server (set to your deployed URL, or empty to skip)
          TRACKING_SERVER_URL: ${{ secrets.TRACKING_SERVER_URL }}

          # IMAP (for bounce/reply detection — optional in CI)
          IMAP_USER: ${{ secrets.GMAIL_USER }}
          IMAP_PASS: ${{ secrets.GMAIL_APP_PASS }}
