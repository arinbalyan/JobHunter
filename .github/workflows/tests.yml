name: Tests
on:
  push:
    branches: [rust/jobhunter, dev, beta, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/registry
          key: rust-cache-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-cache-

      - name: Check Rust
        run: cargo check

      - name: Test Rust
        run: cargo test

      - name: Build Go bridge
        run: cd scraper && go build -o /dev/null .
