name: Tests
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Run tests
        run: go test -race ./tests/... -v -count=1
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
